name: CI/CD Pipeline

# ──────────────────────────────────────────────────────────────
# Manual trigger only — go to Actions tab → "CI/CD Pipeline" → Run workflow.
# Use the force_ inputs to deploy even when no file changes are detected.
# ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Force deploy backend (even if no changes detected)"
        type: boolean
        default: false
      force_frontend:
        description: "Force deploy frontend (even if no changes detected)"
        type: boolean
        default: false

# Cancel any in-progress run for the same workflow to avoid duplicate deploys
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# JOB 1 — Detect which parts of the repo changed
#
# Compares HEAD to HEAD~1 to determine whether the backend or
# frontend directories contain any changes. Force inputs can
# bypass the detection and always trigger a deployment.
# ──────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    name: "🔍 Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2          # need HEAD~1 for diff

      - name: Detect changed paths
        id: changes
        run: |
          # Compare HEAD with previous commit; fall back to full tree on first commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || echo "")

          echo "📝 Changed files in this commit:"
          if [ -z "$CHANGED" ]; then
            echo "  (none — possibly first commit or force override)"
          else
            echo "$CHANGED" | sed 's/^/  /'
          fi
          echo ""

          BACKEND=false
          FRONTEND=false

          echo "$CHANGED" | grep -qE "^backend/" && BACKEND=true
          echo "$CHANGED" | grep -qE "^frontend/" && FRONTEND=true

          # Honour manual force-override inputs
          [ "${{ inputs.force_backend }}"  = "true" ] && BACKEND=true
          [ "${{ inputs.force_frontend }}" = "true" ] && FRONTEND=true

          echo "backend=$BACKEND"   >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔧 Backend changed  : $BACKEND"
          echo "  🎨 Frontend changed : $FRONTEND"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ──────────────────────────────────────────────────────────────
# JOB 2 — Backend tests
#
# Runs when backend files have changed. Uses uv to install
# dependencies and pytest to run the full test suite.
# AWS env vars are set to dummy values so the settings module
# loads without real credentials.
# ──────────────────────────────────────────────────────────────
  test-backend:
    name: "🧪 Test Backend"
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Start backend server & check health endpoint
        run: |
          uv run uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload &
          echo "Waiting for backend server to start..."
          for i in {1..15}; do
            if curl -s http://localhost:8000/health | grep -q "status"; then
              echo "✅ Health check successful!"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Health check failed!"
          exit 1
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_DEFAULT_REGION || 'ap-south-1' }}
          AWS_ENDPOINT_URL: ${{ secrets.AWS_ENDPOINT_URL || '' }}
          S3_BUCKET_NAME: ${{ secrets.S3_BUCKET_NAME }}
          DYNAMODB_TABLE_NAME: ${{ secrets.DYNAMODB_TABLE_NAME || 'ResumePlatformTest' }}
          ENVIRONMENT: ${{ secrets.ENVIRONMENT || 'development' }}
          LOG_LEVEL: ${{ secrets.LOG_LEVEL || 'DEBUG' }}

# ──────────────────────────────────────────────────────────────
# JOB 3 — Frontend tests
#
# Runs when frontend files have changed. Performs a full lint,
# type-check and Vite production build to catch issues early.
# VITE_API_BASE_URL is set to a placeholder value during CI
# so the build doesn't fail before the real URL is known.
# ──────────────────────────────────────────────────────────────
  test-frontend:
    name: "🧪 Test Frontend"
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type-check & Build
        run: npm run build
        env:
          # Use a placeholder during CI — the real URL comes from secrets at deploy time
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://placeholder.execute-api.ap-south-1.amazonaws.com' }}

# ──────────────────────────────────────────────────────────────
# JOB 4 — Deploy backend → AWS Lambda via SAM (ZIP package type)
#
# Deployment flow:
#   1. Checkout repo
#   2. Configure AWS credentials
#   3. Install uv + Python 3.13
#   4. Prepare the deploy/ folder:
#        - Delete deploy/src/ (gitignored — must always be rebuilt)
#        - Copy backend/src/ → backend/deploy/src/
#   5. Export uv.lock → requirements.txt (no hashes, no dev deps)
#   6. Copy requirements.txt → deploy/requirements.txt
#      (SAM reads it from the same directory as template.yaml)
#   7. Install AWS SAM CLI
#   8. `sam build` (runs from backend/deploy/, uses --use-container
#      to get a Lambda-compatible build environment)
#   9. `sam deploy` (uses samconfig.toml defaults but overrides
#      stack name, region, bucket and table via CLI flags)
#   10. Read the ApiUrl CloudFormation output and expose it as a
#       job output so the frontend deploy can consume it.
# ──────────────────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend → AWS Lambda (SAM / ZIP)"
    needs: test-backend
    if: needs.test-backend.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    outputs:
      api_url: ${{ steps.get-url.outputs.api_url }}

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. AWS credentials ───────────────────────────────────────────────
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── 3. Toolchain ─────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ── 4. Prepare deploy/src/ ───────────────────────────────────────────
      # deploy/src is gitignored so it is never committed.
      # We always delete and recreate it to guarantee the Lambda
      # package contains exactly the current HEAD revision of src/.
      - name: Prepare deployment source folder
        run: |
          echo "🧹 Removing stale deploy/src/ (gitignored — always recreated)"
          rm -rf deploy/src

          echo "📂 Copying backend/src/ → backend/deploy/src/"
          cp -r src deploy/src

          echo "✅ deploy/src/ contents:"
          ls -la deploy/src/

      # ── 5. Export requirements ───────────────────────────────────────────
      # SAM needs a plain requirements.txt to pip-install into the Lambda
      # package. We generate it from the locked uv.lock so the Lambda
      # gets identical versions to what tests ran against.
      - name: Generate requirements.txt from uv.lock
        run: |
          uv export \
            --no-dev \
            --format requirements-txt \
            --no-hashes \
            -o requirements.txt

          echo "📦 Generated requirements.txt (first 20 lines):"
          head -20 requirements.txt

      # ── 6. Copy requirements into deploy/ ────────────────────────────────
      # sam build reads requirements.txt relative to template.yaml,
      # which lives in backend/deploy/. We copy it there so SAM can find it.
      - name: Copy requirements.txt → deploy/requirements.txt
        run: |
          cp requirements.txt deploy/requirements.txt
          echo "✅ deploy/requirements.txt is ready ($(wc -l < deploy/requirements.txt) packages)"

      # ── 7. Install AWS SAM CLI ───────────────────────────────────────────
      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ── 8. SAM Build ─────────────────────────────────────────────────────
      # --use-container: builds inside a Lambda-compatible Docker image so
      #   native extensions (e.g. PyMuPDF) are compiled for the right arch.
      # --template-file: explicit path because we run from backend/deploy/.
      - name: SAM Build
        working-directory: backend/deploy
        run: |
          echo "🏗️  Running sam build..."
          sam build \
            --use-container \
            --template-file template.yaml

      # ── 9. SAM Deploy ────────────────────────────────────────────────────
      # --stack-name:              CloudFormation stack to create or update
      # --region:                  ap-south-1 (Mumbai)
      # --no-confirm-changeset:    deploy without interactive prompt (CI)
      # --no-fail-on-empty-changeset: don't error when nothing changed
      # --capabilities CAPABILITY_IAM: allow SAM to create IAM roles
      # --parameter-overrides:     pass runtime bucket/table names from secrets
      - name: SAM Deploy
        working-directory: backend/deploy
        run: |
          echo "🚀 Deploying stack resume-ranker to ap-south-1..."
          sam deploy \
            --stack-name resume-ranker \
            --region ap-south-1 \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --capabilities CAPABILITY_IAM \
            --parameter-overrides \
              S3BucketName=${{ secrets.S3_BUCKET_NAME }} \
              DynamoDBTableName=ResumePlatform

      # ── 10. Extract API Gateway URL ───────────────────────────────────────
      # Read the ApiUrl CloudFormation output so the frontend deploy job
      # can inject it as VITE_API_BASE_URL without hardcoding the URL.
      - name: Get & expose API Gateway URL
        id: get-url
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name resume-ranker \
            --region ap-south-1 \
            --query 'Stacks[0].Outputs[?OutputKey==`ApiUrl`].OutputValue' \
            --output text)

          echo "api_url=$API_URL" >> "$GITHUB_OUTPUT"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Backend deployed successfully!"
          echo ""
          echo "  🌐  API Gateway URL:"
          echo "      $API_URL"
          echo ""
          echo "  📋  Health check:"
          echo "      $API_URL/health"
          echo ""
          echo "  💡  This URL will be injected as VITE_API_BASE_URL"
          echo "      into the Vercel frontend build automatically."
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ──────────────────────────────────────────────────────────────
# JOB 5 — Deploy frontend → Vercel
#
# Depends on test-frontend (must pass) and optionally on
# deploy-backend to get the freshest API Gateway URL.
#
# If deploy-backend did NOT run this cycle (backend unchanged),
# the VITE_API_BASE_URL secret is used as the fallback URL
# so the frontend always has a valid backend endpoint.
#
# The Vercel CLI is invoked with --prod so it publishes to the
# project's production alias, not a preview deployment.
# ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "🚀 Deploy Frontend → Vercel"
    needs: [test-frontend, deploy-backend]
    # Run if test-frontend passed.
    # deploy-backend is listed in needs so we can access its output
    # but we don't require it to have run — it may be skipped when
    # only the frontend changed.
    if: |
      always() &&
      needs.test-frontend.result == 'success' &&
      (needs.deploy-backend.result == 'success' || needs.deploy-backend.result == 'skipped')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      # ── Resolve the backend URL ───────────────────────────────────────────
      # Prefer the freshly-deployed API URL from deploy-backend.
      # Fall back to the VITE_API_BASE_URL secret when the backend
      # was not redeployed this cycle (e.g. frontend-only change).
      - name: Resolve backend API URL
        id: resolve-url
        run: |
          LIVE_URL="${{ needs.deploy-backend.outputs.api_url }}"
          SECRET_URL="${{ secrets.VITE_API_BASE_URL }}"

          if [ -n "$LIVE_URL" ]; then
            echo "Using freshly-deployed backend URL: $LIVE_URL"
            echo "api_url=$LIVE_URL" >> "$GITHUB_OUTPUT"
          elif [ -n "$SECRET_URL" ]; then
            echo "Backend not redeployed — using VITE_API_BASE_URL secret: $SECRET_URL"
            echo "api_url=$SECRET_URL" >> "$GITHUB_OUTPUT"
          else
            echo "❌ ERROR: No backend URL available. Set the VITE_API_BASE_URL secret."
            exit 1
          fi

      # ── Deploy to Vercel (production) ─────────────────────────────────────
      # --token:       Vercel personal access token (from secrets)
      # --prod:        publish to the production alias
      # --yes:         skip interactive confirmation
      # --build-env:   inject VITE_API_BASE_URL at Vercel build time
      #
      # VERCEL_ORG_ID and VERCEL_PROJECT_ID are passed as env vars
      # so the CLI knows which project to deploy without a local .vercel/
      # directory in the repo.
      - name: Deploy to Vercel (production)
        id: vercel-deploy
        run: |
          DEPLOY_OUTPUT=$(npx vercel \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --yes \
            --build-env VITE_API_BASE_URL="${{ steps.resolve-url.outputs.api_url }}" \
            2>&1)

          echo "$DEPLOY_OUTPUT"

          # Extract the production URL from Vercel CLI output
          VERCEL_URL=$(echo "$DEPLOY_OUTPUT" | grep -Eo "https://[a-zA-Z0-9._-]+\.vercel\.app" | tail -1)
          echo "vercel_url=$VERCEL_URL" >> "$GITHUB_OUTPUT"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Frontend deployed successfully!"
          echo ""
          echo "  🌐  Vercel URL:"
          echo "      $VERCEL_URL"
          echo ""
          echo "  📊  Dashboard: https://vercel.com/dashboard"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
