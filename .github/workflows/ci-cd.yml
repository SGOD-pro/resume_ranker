name: CI/CD Pipeline

# ──────────────────────────────────────────────────────────────
# Manual trigger only — go to Actions tab → "CI/CD Pipeline" → Run workflow.
# Use the force_ inputs to deploy even when no file changes are detected.
# ──────────────────────────────────────────────────────────────
on:
  workflow_dispatch:
    inputs:
      force_backend:
        description: "Force deploy backend (even if no changes detected)"
        type: boolean
        default: false
      force_frontend:
        description: "Force deploy frontend (even if no changes detected)"
        type: boolean
        default: false

# Cancel any in-progress run for the same workflow to avoid duplicate deploys
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# ──────────────────────────────────────────────────────────────
# JOB 1 — Detect which parts of the repo changed
#
# Compares HEAD to HEAD~1 to determine whether the backend or
# frontend directories contain any changes. Force inputs can
# bypass the detection and always trigger a deployment.
# ──────────────────────────────────────────────────────────────
jobs:
  detect-changes:
    name: "🔍 Detect Changes"
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.changes.outputs.backend }}
      frontend: ${{ steps.changes.outputs.frontend }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 2          # need HEAD~1 for diff

      - name: Detect changed paths
        id: changes
        run: |
          # Compare HEAD with previous commit; fall back to full tree on first commit
          CHANGED=$(git diff --name-only HEAD~1 HEAD 2>/dev/null || git diff --name-only HEAD 2>/dev/null || echo "")

          echo "📝 Changed files in this commit:"
          if [ -z "$CHANGED" ]; then
            echo "  (none — possibly first commit or force override)"
          else
            echo "$CHANGED" | sed 's/^/  /'
          fi
          echo ""

          BACKEND=false
          FRONTEND=false

          echo "$CHANGED" | grep -qE "^backend/" && BACKEND=true
          echo "$CHANGED" | grep -qE "^frontend/" && FRONTEND=true

          # Honour manual force-override inputs
          [ "${{ inputs.force_backend }}"  = "true" ] && BACKEND=true
          [ "${{ inputs.force_frontend }}" = "true" ] && FRONTEND=true

          echo "backend=$BACKEND"   >> "$GITHUB_OUTPUT"
          echo "frontend=$FRONTEND" >> "$GITHUB_OUTPUT"

          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  🔧 Backend changed  : $BACKEND"
          echo "  🎨 Frontend changed : $FRONTEND"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ──────────────────────────────────────────────────────────────
# JOB 2 — Backend tests
#
# Runs when backend files have changed. Starts the uvicorn server
# and verifies the /health endpoint responds correctly.
# All AWS env vars are read from GitHub Secrets so no credentials
# are ever hardcoded.
# ──────────────────────────────────────────────────────────────
  test-backend:
    name: "🧪 Test Backend"
    needs: detect-changes
    if: needs.detect-changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: false

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Start backend server & check health endpoint
        run: |
          uv run uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload &
          echo "Waiting for backend server to start..."
          for i in {1..15}; do
            if curl -s http://localhost:8000/health | grep -q "status"; then
              echo "✅ Health check successful!"
              exit 0
            fi
            sleep 1
          done
          echo "❌ Health check failed!"
          exit 1
        env:
          AWS_ACCESS_KEY_ID:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION:    ${{ secrets.AWS_DEFAULT_REGION || 'ap-south-1' }}
          AWS_ENDPOINT_URL:      ${{ secrets.AWS_ENDPOINT_URL || '' }}
          S3_BUCKET_NAME:        ${{ secrets.S3_BUCKET_NAME }}
          DYNAMODB_TABLE_NAME:   ${{ secrets.DYNAMODB_TABLE_NAME || 'ResumePlatformTest' }}
          ENVIRONMENT:           ${{ secrets.ENVIRONMENT || 'development' }}
          LOG_LEVEL:             ${{ secrets.LOG_LEVEL || 'DEBUG' }}

# ──────────────────────────────────────────────────────────────
# JOB 3 — Frontend tests
#
# Runs when frontend files have changed. Performs a full lint,
# type-check and Vite production build to catch issues early.
# VITE_API_BASE_URL is set to a placeholder value during CI
# so the build doesn't fail before the real URL is known.
#
# NOTE: all npm commands use `cd frontend &&` instead of
# `working-directory: frontend` — the Vercel project already
# has Root Directory = frontend, so adding working-directory
# would make Vercel look for frontend/frontend.
# ──────────────────────────────────────────────────────────────
  test-frontend:
    name: "🧪 Test Frontend"
    needs: detect-changes
    if: needs.detect-changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      - name: Lint
        run: cd frontend && npm run lint

      - name: Type-check & Build
        run: cd frontend && npm run build
        env:
          # Use a placeholder during CI — the real URL comes from secrets at deploy time
          VITE_API_BASE_URL: ${{ secrets.VITE_API_BASE_URL || 'https://placeholder.execute-api.ap-south-1.amazonaws.com' }}

# ──────────────────────────────────────────────────────────────
# JOB 4 — Deploy backend → AWS Lambda via SAM (ZIP package type)
#
# Deployment flow:
#   1. Checkout repo
#   2. Configure AWS credentials via aws-actions/configure-aws-credentials
#      (GitHub runners have NO local AWS CLI profiles — all auth comes
#       from secrets only; samconfig.toml must NOT contain profile =)
#   3. Install uv + Python 3.13
#   4. Prepare the deploy/ folder:
#        - Delete deploy/src/ (gitignored — must always be rebuilt)
#        - Copy backend/src/ → backend/deploy/src/
#   5. Export uv.lock → requirements.txt (no hashes, no dev deps)
#   6. Copy requirements.txt → deploy/requirements.txt
#      (SAM reads it from the same directory as template.yaml)
#   7. Install AWS SAM CLI
#   8. `sam build` from backend/deploy/ using --use-container for
#      Lambda-compatible native extension compilation
#   9. `sam deploy --config-env default` — reads stack name, region,
#      capabilities from samconfig.toml; no --profile flag used
#   10. Query CloudFormation for the ApiUrl output and print it.
# ──────────────────────────────────────────────────────────────
  deploy-backend:
    name: "🚀 Deploy Backend → AWS Lambda (SAM / ZIP)"
    needs: test-backend
    if: needs.test-backend.result == 'success'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. AWS credentials ───────────────────────────────────────────────
      # GitHub runners have no ~/.aws/config — authenticate entirely from
      # secrets. SAM automatically picks up the environment variables set
      # by this action; no --profile flag is ever needed or used.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # ── 3. Toolchain ─────────────────────────────────────────────────────
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"
          enable-cache: true
          cache-dependency-glob: "backend/uv.lock"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # ── 4. Prepare deploy/src/ ───────────────────────────────────────────
      # deploy/src is gitignored so it is never committed.
      # We always delete and recreate it to guarantee the Lambda
      # package contains exactly the current HEAD revision of src/.
      - name: Prepare deployment source folder
        run: |
          echo "🧹 Removing stale deploy/src/ (gitignored — always recreated)"
          rm -rf deploy/src

          echo "📂 Copying backend/src/ → backend/deploy/src/"
          cp -r src deploy/src

          echo "✅ deploy/src/ contents:"
          ls -la deploy/src/

      # ── 5. Export requirements ───────────────────────────────────────────
      # SAM needs a plain requirements.txt to pip-install into the Lambda
      # package. We generate it from the locked uv.lock so the Lambda
      # gets identical versions to what tests ran against.
      - name: Generate requirements.txt from uv.lock
        run: |
          uv export \
            --no-dev \
            --format requirements-txt \
            --no-hashes \
            -o requirements.txt

          echo "📦 Generated requirements.txt (first 20 lines):"
          head -20 requirements.txt

      # ── 6. Copy requirements into deploy/ ────────────────────────────────
      # sam build reads requirements.txt relative to template.yaml,
      # which lives in backend/deploy/. We copy it there so SAM can find it.
      - name: Copy requirements.txt → deploy/requirements.txt
        run: |
          cp requirements.txt deploy/requirements.txt
          echo "✅ deploy/requirements.txt is ready ($(wc -l < deploy/requirements.txt) packages)"

      # ── 7. Install AWS SAM CLI ───────────────────────────────────────────
      - name: Install AWS SAM CLI
        uses: aws-actions/setup-sam@v2
        with:
          use-installer: true

      # ── 8. SAM Build ─────────────────────────────────────────────────────
      # --use-container: builds inside a Lambda-compatible Docker image so
      #   native extensions (e.g. PyMuPDF) are compiled for the right arch.
      # --template-file: explicit path because we run from backend/deploy/.
      - name: SAM Build
        working-directory: backend/deploy
        run: |
          echo "🏗️  Running sam build..."
          sam build \
            --use-container \
            --template-file template.yaml

      # ── 9. SAM Deploy ────────────────────────────────────────────────────
      # --config-env default:        read stack name, region, capabilities,
      #                              and parameter-overrides from samconfig.toml
      # --no-confirm-changeset:      deploy without interactive prompt (CI)
      # --no-fail-on-empty-changeset: don't error when nothing changed
      # --parameter-overrides:       pass runtime bucket/table names from secrets
      #
      # NO --profile flag — credentials come from aws-actions/configure-aws-credentials
      - name: SAM Deploy
        working-directory: backend/deploy
        run: |
          echo "🚀 Deploying stack resume-ranker to ap-south-1..."
          sam deploy \
            --config-env default \
            --no-confirm-changeset \
            --no-fail-on-empty-changeset \
            --parameter-overrides \
              S3BucketName=${{ secrets.S3_BUCKET_NAME }} \
              DynamoDBTableName=ResumePlatform

      # ── 10. Print API Gateway URL ─────────────────────────────────────────
      # Read the ApiUrl CloudFormation output and print it in the logs.
      - name: Print API Gateway URL
        run: |
          API_URL=$(aws cloudformation describe-stacks \
            --stack-name resume-ranker \
            --region ap-south-1 \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text)

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Backend deployed successfully!"
          echo ""
          echo "  🌐  API Gateway URL:"
          echo "      $API_URL"
          echo ""
          echo "  📋  Health check:"
          echo "      $API_URL/health"
          echo ""
          echo "  💡  Update VITE_API_BASE_URL secret to:"
          echo "      $API_URL"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"

# ──────────────────────────────────────────────────────────────
# JOB 5 — Deploy frontend → Vercel
#
# Depends only on test-frontend. Completely independent of the
# backend deployment — it queries CloudFormation directly for
# the current API URL rather than consuming deploy-backend output.
#
# Vercel Project Settings: Root Directory = frontend
# Therefore we MUST NOT set `working-directory: frontend` here —
# all npm / Vercel commands use `cd frontend &&` inline instead.
# Using working-directory would make Vercel search for frontend/frontend
# and fail.
#
# API URL resolution order:
#   1. CloudFormation → resume-ranker stack ApiUrl output (live URL)
#   2. VITE_API_BASE_URL secret (fallback when stack not yet deployed)
# ──────────────────────────────────────────────────────────────
  deploy-frontend:
    name: "🚀 Deploy Frontend → Vercel"
    needs: [test-frontend]
    if: needs.test-frontend.result == 'success'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Configure AWS credentials to query CloudFormation ─────────────────
      # Needed to read the current ApiUrl from the deployed stack.
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      - name: Set up Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: cd frontend && npm ci

      # ── Resolve the backend API URL ───────────────────────────────────────
      # Query CloudFormation directly — no dependency on deploy-backend job.
      # If the stack does not exist yet, fall back to the VITE_API_BASE_URL secret.
      - name: Resolve backend API URL
        id: resolve-url
        run: |
          echo "🔍 Querying CloudFormation for ApiUrl..."

          LIVE_URL=$(aws cloudformation describe-stacks \
            --stack-name resume-ranker \
            --region ap-south-1 \
            --query "Stacks[0].Outputs[?OutputKey=='ApiUrl'].OutputValue" \
            --output text 2>/dev/null || echo "")

          SECRET_URL="${{ secrets.VITE_API_BASE_URL }}"

          if [ -n "$LIVE_URL" ] && [ "$LIVE_URL" != "None" ]; then
            echo "✅ Using live CloudFormation URL: $LIVE_URL"
            echo "api_url=$LIVE_URL" >> "$GITHUB_OUTPUT"
          elif [ -n "$SECRET_URL" ]; then
            echo "⚠️  Stack not found — using VITE_API_BASE_URL secret: $SECRET_URL"
            echo "api_url=$SECRET_URL" >> "$GITHUB_OUTPUT"
          else
            echo "❌ ERROR: No backend URL available."
            echo "   Either deploy the backend first, or set the VITE_API_BASE_URL secret."
            exit 1
          fi

      # ── Deploy to Vercel (production) ─────────────────────────────────────
      # --token:     Vercel personal access token (from secrets)
      # --prod:      publish to the production alias
      # --yes:       skip interactive confirmation
      # --build-env: inject VITE_API_BASE_URL at Vercel build time
      #
      # VERCEL_ORG_ID and VERCEL_PROJECT_ID are passed as env vars so the
      # CLI knows which project to deploy without a local .vercel/ directory.
      #
      # We run from the repo root (`cd frontend &&`) — NOT with
      # `working-directory: frontend` — because Vercel already has
      # Root Directory = frontend configured in its project settings.
      - name: Deploy to Vercel (production)
        id: vercel-deploy
        run: |
          cd frontend

          npx vercel \
            --token "${{ secrets.VERCEL_TOKEN }}" \
            --prod \
            --yes \
            --build-env VITE_API_BASE_URL="${{ steps.resolve-url.outputs.api_url }}" | tee deploy.log

          # Extract the production deployment URL from Vercel CLI output
          VERCEL_URL=$(cat deploy.log | grep -Eo "https://[a-zA-Z0-9._-]+\.vercel\.app" | tail -1)
          echo "vercel_url=$VERCEL_URL" >> "$GITHUB_OUTPUT"

          echo ""
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
          echo "  ✅  Frontend deployed successfully!"
          echo ""
          echo "  🌐  Vercel URL:"
          echo "      $VERCEL_URL"
          echo ""
          echo "  🔗  Backend API URL injected:"
          echo "      ${{ steps.resolve-url.outputs.api_url }}"
          echo ""
          echo "  📊  Dashboard: https://vercel.com/dashboard"
          echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
        env:
          VERCEL_ORG_ID:     ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
